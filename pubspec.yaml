name: wazenie_app
description: System Ważenia - aplikacja mobilna i webowa do zarządzania przyjęciem surowca.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_remote_config: ^5.1.3
  firebase_analytics: ^11.3.3

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.3.0

  # Offline storage
  hive_flutter: ^1.1.0

  # Crypto (PIN hashing)
  crypto: ^3.0.5

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.0

  # PDF + printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # QR code generation
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
